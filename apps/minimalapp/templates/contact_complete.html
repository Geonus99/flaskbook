<!DOCTYPE html>
<html lang="ko">
    <head>
        <meth charset="UTF-8"/>
        <title>문의 완료</title>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul>
            {% for message in messages %}
            <li>{{message}}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        <link rel="stylesheet" href=""{{url_for('static',filename='css/style.css')}}"/>
    </head>

    <body>
        <h2>문의 완료</h2>
    </body>
</html>
